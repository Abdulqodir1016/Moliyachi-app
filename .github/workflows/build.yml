name: APK Yigish Bot1

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
        pip install --upgrade pip
        pip install buildozer cython virtualenv
        
    - name: Build APK with Buildozer
      run: |
        buildozer init
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,plyer,sqlite3/g' buildozer.spec
        yes | buildozer -v android debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Moliyachi-Obodon-APK
        path: bin/*.apk
